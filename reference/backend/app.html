<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram Web App Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>


</head>
<body>
  <div class="header">
      <h3>Все заявки</h3>
  </div>
  <div class="wrapper">
  <p id="response"></p>
  </div>
  
  <script>
Telegram.WebApp.ready();
const tg = window.Telegram.WebApp;
tg.setHeaderColor("#55afbe")
      tg.addToHomeScreen();
// Get the chat ID of the user who opened the web app
const chatId = Telegram.WebApp.initDataUnsafe.user.id;

// Send the chat ID to the server
fetch(`api/details.php?chat_id=${chatId}`)
  .then(response => response.text())
  .then(html => {
    // Выделяем жирным шрифтом слова "Имя", "Телефон" и "Email"
    const wordsToHighlight = ['Имя', 'телефон', 'Email','Ваше','Сообщение'];
    let newHtml = html;
    wordsToHighlight.forEach(word => {
      const regex = new RegExp(`(${word})`, 'gi');
      newHtml = newHtml.replace(regex, `<strong>$1</strong>`);
    });

    // Отображаем обновленный HTML на странице
    const responseElement = document.getElementById('response');
    responseElement.innerHTML = newHtml;
  })
  .catch(error => {
    console.error('Error:', error);
  });
  </script>

</body>
</html>
